name: Fudpin CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test
        run: echo "Tests passed 🚀"

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t shakirkaki/fudpin-backend:latest .

      - name: Push Docker image
        run: docker push shakirkaki/fudpin-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Pulling latest image..."
            docker pull shakirkaki/fudpin-backend:latest

            echo "🛑 Stopping old container..."
            docker stop fudpin-backend || true
            docker rm fudpin-backend || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name fudpin-backend \
              --network fudpin-net \
              --env-file /home/dishwayadmin/fudpin-backend-v3/.env \
              shakirkaki/fudpin-backend:latest

            echo "🔄 Restarting nginx..."
            docker restart nginx || true

            echo "✅ Deployment complete"
