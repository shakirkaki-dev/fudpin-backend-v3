name: Fudpin CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test
        run: echo "Tests passed 🚀"

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 LOGIN TO DOCKER HUB
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🏗 BUILD IMAGE
      - name: Build Docker image
        run: docker build -t shakirkaki/fudpin-backend:latest .

      # 🚀 PUSH IMAGE
      - name: Push Docker image
        run: docker push shakirkaki/fudpin-backend:latest
